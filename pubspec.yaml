name: athar_app
description: Athar - Smart Lost & Found System for Hajj & Umrah Pilgrims

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3

  # State Management
  provider: ^6.1.1
  flutter_local_notifications: ^21.0.0

  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.3

  # Image & Storage
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  image: ^4.1.7
  
  # AI/ML
  tflite_flutter: ^0.12.1
  google_generative_ai: ^0.4.7

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.2.0
  http: ^1.2.0
  url_launcher: ^6.2.4
  timeago: ^3.6.1
  share_plus:
  csv:

  # PDF Generation & Viewing
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/models/
    - assets/l10n/
